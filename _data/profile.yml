short_bio: >-
  <p>
    I am a fourth-year Ph.D. student in Computer Science at the <a href="https://sds.cuhk.edu.cn/en" target="_blank">School of Data Science, The Chinese University of Hong Kong, Shenzhen (CUHK-Shenzhen)</a>, where I am fortunate to be supervised by <a href="https://shuangli01.github.io/" target="_blank">Prof. Shuang Li</a>. I received my M.Sc. in Statistics with Data Science from <a href="https://www.ed.ac.uk/" target="_blank">The University of Edinburgh</a> and my B.Sc. in Statistics from <a href="https://www.en.sdu.edu.cn/" target="_blank">Shandong University</a>, where I also completed a dual bachelor's degree in Finance.
  </p>

